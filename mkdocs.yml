site_name: GenAI & Agentic AI Handbook
site_description: A beginner-to-advanced curriculum for GenAI and Agentic AI with hands-on exercises.
site_author: mail2raji
site_url: https://mail2raji.github.io/genai-agentic-ai-handbook/
repo_url: https://github.com/mail2raji/genai-agentic-ai-handbook
repo_name: mail2raji/genai-agentic-ai-handbook
edit_uri: edit/main/

docs_dir: docs
site_dir: _site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
